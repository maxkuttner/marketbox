name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync to VPS
        run: |
          rsync -avz dags/          ${{ secrets.VPS_HOST }}:/opt/airflow/dags/
          rsync -avz migrations/    ${{ secrets.VPS_HOST }}:/opt/airflow/migrations/
          rsync -avz migrate.py pyproject.toml uv.lock \
                                    ${{ secrets.VPS_HOST }}:/opt/airflow/
          rsync -avz fetch_optchain.py load_optchain.py \
                    fetch_equity_daily.py load_equity_daily.py \
                    fetch_rates.py load_rates.py compute_iv.py \
                                    ${{ secrets.VPS_HOST }}:/opt/airflow/

      - name: Sync dependencies
        run: |
          ssh ${{ secrets.VPS_HOST }} "which uv || curl -LsSf https://astral.sh/uv/install.sh | sh"
          ssh ${{ secrets.VPS_HOST }} "cd /opt/airflow && uv sync --frozen"

      - name: Run migrations
        run: ssh ${{ secrets.VPS_HOST }} "cd /opt/airflow && .venv/bin/python migrate.py"

      - name: Restart Airflow
        run: ssh ${{ secrets.VPS_HOST }} "sudo systemctl restart airflow"
