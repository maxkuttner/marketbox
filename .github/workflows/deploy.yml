name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "StrictHostKeyChecking no" >> ~/.ssh/config

      - name: Sync to VPS
        run: |
          rsync -avz --exclude='airflow.cfg' dags/ ${{ secrets.VPS_HOST }}:/home/max/stack/dags/
          rsync -avz migrations/ ${{ secrets.VPS_HOST }}:/home/max/stack/migrations/
          rsync -avz migrate.py ${{ secrets.VPS_HOST }}:/home/max/stack/migrate.py
          if [ -d src ]; then rsync -avz src/ ${{ secrets.VPS_HOST }}:/home/max/stack/src/; fi

      - name: Run migrations
        run: ssh ${{ secrets.VPS_HOST }} "cd /home/max/stack && .venv/bin/python migrate.py"
